{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h2>Welcome Back</h2>
    <p class="auth-sub">Sign in to save and manage your builds.</p>
    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="you@email.com" class="form-input">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="••••••••" class="form-input">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Sign In</button>
    </form>
    <p class="auth-footer">Don't have an account? <a href="{{ url_for('auth.register') }}">Register</a></p>
  </div>
</div>
{% endblock %}
